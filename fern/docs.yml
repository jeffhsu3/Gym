instances:
  - url: nvidia-gym.docs.buildwithfern.com/nemo/gym
    custom-domain: docs.nvidia.com/nemo/gym

title: NeMo Gym

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /
  right-text: NeMo Gym

favicon: ./assets/NVIDIA_symbol.svg

# NVIDIA Adobe Launch (docs.nvidia.com analytics; matches other NVIDIA Fern docs)
js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive

css:
  - ./main.css

navbar-links:
  - type: github
    value: https://github.com/NVIDIA-NeMo/Gym

libraries:
  nemo-gym:
    input:
      git: https://github.com/NVIDIA-NeMo/Gym
      subpath: nemo_gym
    output:
      path: ./product-docs/nemo-gym/Full-Library-Reference
    lang: python

experimental:
  mdx-components:
    - ./components
  basepath-aware: true

versions:
  - display-name: Main
    path: versions/main.yml
    slug: main
    availability: beta
  - display-name: Latest
    path: versions/latest.yml
    slug: latest
    availability: stable
  - display-name: "0.2.1"
    path: versions/v0.2.1.yml
    slug: v0.2.1
    availability: stable

redirects:
  # With `experimental.basepath-aware: true`, both source and destination must include
  # the full `/nemo/gym/` basepath with a leading slash. See nemo-curator's docs.yml.
  # Legacy Sphinx top-level entry points (Main is now the default version)
  - source: "/nemo/gym/index.html"
    destination: "/nemo/gym/main"
  - source: "/nemo/gym/index"
    destination: "/nemo/gym/main"
  # Legacy Sphinx page paths → current Fern slugs
  - source: "/nemo/gym/about/concepts/configuration-system.html"
    destination: "/nemo/gym/about/concepts/configuration"
  - source: "/nemo/gym/about/concepts/core-abstractions.html"
    destination: "/nemo/gym/about/core-components"
  - source: "/nemo/gym/get-started/setup-installation.html"
    destination: "/nemo/gym/get-started/installation"
  - source: "/nemo/gym/how-to-faq.html"
    destination: "/nemo/gym/reference/faq"
  - source: "/nemo/gym/infrastructure/aiohttp-vs-httpx.html"
    destination: "/nemo/gym/infrastructure/engineering-notes/aiohttp-vs-httpx"
  - source: "/nemo/gym/infrastructure/swe-rl-case-study.html"
    destination: "/nemo/gym/infrastructure/engineering-notes/swe-rl-case-study"
  - source: "/nemo/gym/training/rl-framework-integration/generation-backend-and-openai-compatible-http-server.html"
    destination: "/nemo/gym/contribute/rl-framework-integration/generation-backend-and-openai-compatible-http-server"
  - source: "/nemo/gym/training/rl-framework-integration/gym-integration-footprint-and-form-factor.html"
    destination: "/nemo/gym/contribute/rl-framework-integration/gym-integration-footprint-and-form-factor"
  - source: "/nemo/gym/training/rl-framework-integration/gym-rl-framework-integration-success-criteria.html"
    destination: "/nemo/gym/contribute/rl-framework-integration/gym-rl-framework-integration-success-criteria"
  - source: "/nemo/gym/training/rl-framework-integration/index.html"
    destination: "/nemo/gym/contribute/rl-framework-integration"
  - source: "/nemo/gym/training/rl-framework-integration/integration-footprint.html"
    destination: "/nemo/gym/contribute/rl-framework-integration/gym-integration-footprint-and-form-factor"
  - source: "/nemo/gym/training/rl-framework-integration/on-policy-corrections.html"
    destination: "/nemo/gym/contribute/rl-framework-integration/openai-compatible-http-server-on-policy-correction"
  - source: "/nemo/gym/training/rl-framework-integration/openai-compatible-http-server-on-policy-correction.html"
    destination: "/nemo/gym/contribute/rl-framework-integration/openai-compatible-http-server-on-policy-correction"
  - source: "/nemo/gym/tutorials/creating-resource-server.html"
    destination: "/nemo/gym/environment-tutorials/single-step-environment"
  - source: "/nemo/gym/tutorials/index.html"
    destination: "/nemo/gym/training-tutorials"
  - source: "/nemo/gym/tutorials/nemo-rl-grpo/about-workplace-assistant.html"
    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo/about-workplace-assistant"
  - source: "/nemo/gym/tutorials/nemo-rl-grpo/gym-configuration.html"
    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo/gym-configuration"
  - source: "/nemo/gym/tutorials/nemo-rl-grpo/index.html"
    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo"
  - source: "/nemo/gym/tutorials/nemo-rl-grpo/multi-node-training.html"
    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo/multi-node-training"
  - source: "/nemo/gym/tutorials/nemo-rl-grpo/nemo-rl-configuration.html"
    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo/nemo-rl-configuration"
  - source: "/nemo/gym/tutorials/nemo-rl-grpo/setup.html"
    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo/setup"
  - source: "/nemo/gym/tutorials/nemo-rl-grpo/single-node-training.html"
    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo/single-node-training"
  - source: "/nemo/gym/tutorials/offline-training-w-rollouts.html"
    destination: "/nemo/gym/training-tutorials/offline-training-w-rollouts"
  # Renamed/moved pages within the Fern site
  - source: "/nemo/gym/latest/get-started/detailed-setup"
    destination: "/nemo/gym/latest/get-started/quickstart"
  - source: "/nemo/gym/latest/get-started/rollout-collection"
    destination: "/nemo/gym/latest/get-started/quickstart"
  - source: "/nemo/gym/latest/about/concepts/core-components"
    destination: "/nemo/gym/latest/about/core-components"
  - source: "/nemo/gym/latest/about/concepts/architecture"
    destination: "/nemo/gym/latest/infrastructure/engineering-notes/system-design"
  - source: "/nemo/gym/latest/about/concepts/task-verification"
    destination: "/nemo/gym/latest/resources-server"
  - source: "/nemo/gym/latest/about/concepts/configuration"
    destination: "/nemo/gym/latest/reference/configuration"
  - source: "/nemo/gym/latest/about/concepts/training-approaches"
    destination: "/nemo/gym/latest/about/concepts/training"
  - source: "/nemo/gym/latest/environment-tutorials/designing-customer-evaluation"
    destination: "/nemo/gym/latest/environment-tutorials"
  - source: "/nemo/gym/v0.2.1/environment-tutorials/real-world-data-generation"
    destination: "/nemo/gym/v0.2.1/environment-tutorials/real-world-environment/generating-training-data"
  - source: "/nemo/gym/v0.2.1/environment-tutorials/real-world-implementation"
    destination: "/nemo/gym/v0.2.1/environment-tutorials/real-world-environment/resources-server-implementation"
  - source: "/nemo/gym/latest/environment-tutorials/real-world-data-generation"
    destination: "/nemo/gym/latest/environment-tutorials/real-world-environment/generating-training-data"
  - source: "/nemo/gym/latest/environment-tutorials/real-world-implementation"
    destination: "/nemo/gym/latest/environment-tutorials/real-world-environment/resources-server-implementation"
  # Version alias: v0.2 → v0.2.1
  - source: "/nemo/gym/v0.2"
    destination: "/nemo/gym/v0.2.1"
  - source: "/nemo/gym/v0.2/:path*"
    destination: "/nemo/gym/v0.2.1/:path*"
  # README/blog links that pointed to Sphinx pages whose canonical was renamed in Fern
  - source: "/nemo/gym/latest/training-tutorials/unsloth-training"
    destination: "/nemo/gym/latest/training-tutorials/unsloth"
  - source: "/nemo/gym/latest/apidocs"
    destination: "/nemo/gym/api/reference/api-reference"
  - source: "/nemo/gym/latest/environment-tutorials/creating-training-environment"
    destination: "/nemo/gym/latest/environment-tutorials/single-step-environment"
  # Version-root index.html: explicit because :path* does not match the empty-path case
  - source: "/nemo/gym/latest/index.html"
    destination: "/nemo/gym/latest"
  - source: "/nemo/gym/v0.2.1/index.html"
    destination: "/nemo/gym/v0.2.1"
  - source: "/nemo/gym/main/index.html"
    destination: "/nemo/gym/main"
  # Catch-all: Sphinx `.../index.html` → Fern canonical (must precede `.html` catch-all)
  - source: "/nemo/gym/latest/:path*/index.html"
    destination: "/nemo/gym/latest/:path*"
  - source: "/nemo/gym/v0.2.1/:path*/index.html"
    destination: "/nemo/gym/v0.2.1/:path*"
  - source: "/nemo/gym/:path*/index.html"
    destination: "/nemo/gym/:path*"
  # Catch-all: Sphinx `foo.html` → Fern canonical `foo`
  - source: "/nemo/gym/:path*.html"
    destination: "/nemo/gym/:path*"
